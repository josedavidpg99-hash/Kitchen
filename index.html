<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kitchen Inventory Adjustments</title>

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap');

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #f5f4f0;
      color: #1a1a1a;
      font-family: 'DM Mono', monospace;
      padding: 28px 18px;
    }

    .container {
      max-width: 1300px;
      margin: 0 auto;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 22px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .eyebrow {
      font-size: 10px;
      color: #aaa;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 26px;
      font-weight: 800;
      margin: 2px 0 0;
      letter-spacing: -0.02em;
    }

    .line {
      width: 38px;
      height: 2px;
      background: #1a1a1a;
      margin-top: 7px;
    }

    .date {
      margin-top: 4px;
      font-size: 11px;
      color: #aaa;
    }

    .setup {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      margin-bottom: 20px;
      max-width: 560px;
      align-items: end;
    }

    .sl {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 5px;
    }

    .fi {
      background: #fff;
      border: 1.5px solid #ddd;
      border-radius: 4px;
      padding: 7px 9px;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: #1a1a1a;
      width: 100%;
      outline: none;
    }

    .fi:focus {
      border-color: #1a1a1a;
    }

    .btn {
      padding: 8px 14px;
      border: 1.5px solid #ccc;
      border-radius: 4px;
      background: #fff;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: #666;
      cursor: pointer;
      white-space: nowrap;
    }

    .btn.active {
      background: #1a1a1a;
      border-color: #1a1a1a;
      color: #fff;
    }

    .dark-btn {
      background: #1a1a1a;
      color: #fff;
      border: none;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      padding: 9px 14px;
      border-radius: 4px;
      cursor: pointer;
    }

    .dark-btn:hover {
      background: #333;
    }

    .upload {
      margin-bottom: 22px;
    }

    .upload-box {
      background: #fff;
      color: #1a1a1a;
      border: 1.5px dashed #aaa;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      padding: 28px 24px;
      border-radius: 6px;
      cursor: pointer;
      width: 100%;
      text-align: center;
      transition: all 0.2s;
    }

    .upload-box:hover {
      border-color: #1a1a1a;
      background: #fafafa;
    }

    .loaded-box {
      display: none;
      align-items: center;
      gap: 12px;
      background: #fff;
      border: 1.5px solid #c8e6c9;
      border-radius: 5px;
      padding: 10px 14px;
    }

    .status-card {
      background: #fff;
      border: 1.5px solid #e0e0e0;
      border-radius: 5px;
      padding: 8px 13px;
      margin-bottom: 16px;
      font-size: 12px;
      color: #555;
      display: none;
      gap: 18px;
      flex-wrap: wrap;
    }

    .error {
      display: none;
      margin-top: 8px;
      font-size: 11px;
      color: #c0392b;
      background: #fdf0ee;
      padding: 8px 12px;
      border-radius: 4px;
    }

    .table-wrap {
      display: none;
      overflow-x: auto;
      background: #fff;
      border: 1.5px solid #e0e0e0;
      border-radius: 6px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    th {
      padding: 9px 11px;
      text-align: left;
      font-size: 9px;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: #999;
      font-weight: 500;
      border-bottom: 2px solid #1a1a1a;
      white-space: nowrap;
    }

    td {
      padding: 7px 11px;
      border-bottom: 1px solid #ebebeb;
      vertical-align: middle;
    }

    tbody tr:hover td {
      background: #fafafa;
    }

    .right {
      text-align: right;
    }

    .center {
      text-align: center;
    }

    .adj-up {
      background: #edfbf2;
      color: #1a7a3e;
      font-weight: 500;
      padding: 3px 8px;
      border-radius: 3px;
      font-size: 11px;
      display: inline-block;
    }

    .adj-down {
      background: #fdf0ee;
      color: #c0392b;
      font-weight: 500;
      padding: 3px 8px;
      border-radius: 3px;
      font-size: 11px;
      display: inline-block;
    }

    .adj-ok {
      color: #aaa;
      font-size: 11px;
    }

    .lp-ok {
      color: #1a7a3e;
      font-weight: 500;
      font-size: 11px;
    }

    .lp-no {
      color: #c0392b;
      font-weight: 500;
      font-size: 11px;
    }

    .lp-na {
      color: #ccc;
      font-size: 11px;
    }

    .summary {
      display: none;
      margin-top: 12px;
      padding: 10px 14px;
      background: #fff;
      border: 1.5px solid #e0e0e0;
      border-radius: 5px;
      font-size: 11px;
      color: #888;
      gap: 20px;
      flex-wrap: wrap;
    }

    .empty {
      text-align: center;
      padding: 40px 20px;
      color: #bbb;
      font-size: 13px;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .signature {
      display: none;
      margin-top: 26px;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 24px;
      max-width: 560px;
    }

    .signature-line {
      border-bottom: 1.5px solid #ccc;
      padding-bottom: 22px;
    }

    @media print {
      .no-print {
        display: none !important;
      }

      body {
        background: white;
        padding: 12px;
      }

      .table-wrap, .summary, .signature {
        display: block !important;
      }

      input {
        border: none !important;
      }
    }

    @media (max-width: 720px) {
      .setup {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="top">
      <div>
        <div class="eyebrow">Inventory · Adjustments</div>
        <h1>Kitchen Adjustments</h1>
        <div class="line"></div>
        <div class="date" id="todayText"></div>
      </div>

      <div class="actions no-print">
        <button class="dark-btn" onclick="exportAdjustments()">Export Adjustments CSV</button>
        <button class="dark-btn" onclick="window.print()">Print / Save PDF</button>
      </div>
    </div>

    <div class="setup">
      <div>
        <div class="sl">Kitchen Name</div>
        <input class="fi" id="kitchenName" placeholder="e.g. LESL2 Kitchen" oninput="updateStatus()" />
      </div>

      <div>
        <div class="sl">Shift</div>
        <div style="display: flex; gap: 6px;">
          <button id="startBtn" class="btn" onclick="setShift('Start of Shift')">Start of Shift</button>
          <button id="endBtn" class="btn" onclick="setShift('End of Shift')">End of Shift</button>
        </div>
      </div>
    </div>

    <div class="status-card" id="statusCard"></div>

    <div class="upload no-print">
      <div class="sl">System Data File</div>
      <input id="fileInput" type="file" accept=".csv,.xls,.xlsx" style="display:none;" onchange="handleFile(event)" />

      <button id="uploadBox" class="upload-box" onclick="document.getElementById('fileInput').click()">
        <div style="font-size:22px; margin-bottom:6px;">📂</div>
        <div style="font-weight:500;">Click to upload CSV or Excel</div>
        <div style="font-size:11px; color:#aaa; margin-top:4px;">
          Needs columns like Item, LP Number, Sum of On Hand
        </div>
      </button>

      <div id="loadedBox" class="loaded-box">
        <span style="font-size:18px;">✅</span>
        <div style="flex:1;">
          <div id="loadedFileName" style="font-size:12px; color:#1a1a1a; font-weight:500;"></div>
          <div id="loadedCount" style="font-size:11px; color:#888;"></div>
        </div>
        <button class="btn" onclick="removeFile()">Remove</button>
      </div>

      <div id="errorBox" class="error"></div>
    </div>

    <div id="emptyBox" class="empty">
      Upload your system file above to get started.
    </div>

    <div id="tableWrap" class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Item</th>
            <th>Description</th>
            <th>Sys LP</th>
            <th class="right">Sys Qty</th>
            <th>Phy LP</th>
            <th class="right">Phy Qty</th>
            <th class="right">Difference</th>
            <th class="center">Adjustment</th>
            <th class="center">LP Match</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>

    <div id="summaryBox" class="summary"></div>

    <div id="signatureBox" class="signature">
      <div>
        <div class="sl">Counted By</div>
        <div class="signature-line"></div>
      </div>
      <div>
        <div class="sl">Verified By</div>
        <div class="signature-line"></div>
      </div>
      <div>
        <div class="sl">Date / Time</div>
        <div class="signature-line"></div>
      </div>
    </div>
  </div>

  <script>
    let sysRows = [];
    let phyData = {};
    let selectedShift = "";

    const today = new Date().toLocaleDateString("en-US", {
      weekday: "short",
      year: "numeric",
      month: "short",
      day: "numeric",
    });

    document.getElementById("todayText").textContent = today;

    function fmt(n) {
      const num = parseFloat(n);
      if (isNaN(num)) return "—";
      return num.toLocaleString("en-US", {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2,
      });
    }

    function setShift(value) {
      selectedShift = value;
      document.getElementById("startBtn").classList.toggle("active", value === "Start of Shift");
      document.getElementById("endBtn").classList.toggle("active", value === "End of Shift");
      updateStatus();
    }

    function updateStatus() {
      const kitchen = document.getElementById("kitchenName").value.trim();
      const card = document.getElementById("statusCard");

      let html = "";

      if (kitchen) {
        html += `<span>Kitchen: <strong style="color:#1a1a1a;">${escapeHtml(kitchen)}</strong></span>`;
      }

      if (selectedShift) {
        html += `<span>Shift: <strong style="color:#1a1a1a;">${selectedShift}</strong></span>`;
      }

      card.innerHTML = html;
      card.style.display = html ? "flex" : "none";
    }

    function findColumn(headers, keys) {
      for (const key of keys) {
        const index = headers.findIndex(h => h.includes(key));
        if (index !== -1) return index;
      }
      return -1;
    }

    function parseSheet(data) {
      if (!data || data.length < 2) return null;

      const headers = data[0].map(h => (h || "").toString().trim().toLowerCase());

      const iItem = findColumn(headers, ["item"]);
      const iDesc = findColumn(headers, ["description", "desc"]);
      const iSysLP = findColumn(headers, ["lp number", "lp", "bin number"]);
      const iQty = findColumn(headers, [
        "sum of on hand",
        "sum of available",
        "on hand",
        "available",
        "quantity",
        "qty"
      ]);
      const iExp = findColumn(headers, ["expiration"]);

      if (iItem === -1 || iQty === -1) return null;

      return data.slice(1)
        .filter(row => {
          const item = (row[iItem] ?? "").toString().trim();
          const qty = parseFloat(row[iQty] ?? "");
          return item && item.toLowerCase() !== "total" && !isNaN(qty);
        })
        .map((row, index) => {
          const item = (row[iItem] ?? "").toString().trim();
          const lp = iSysLP !== -1 ? (row[iSysLP] ?? "").toString().trim() : "";

          return {
            key: `${item}-${lp}-${index}`,
            id: item,
            desc: iDesc !== -1 ? (row[iDesc] ?? "").toString().trim() : "",
            sysLP: lp,
            sysQty: parseFloat(row[iQty]),
            exp: iExp !== -1 ? (row[iExp] ?? "").toString().trim() : "",
          };
        })
        .sort((a, b) => a.id.localeCompare(b.id, undefined, { numeric: true }));
    }

    async function handleFile(event) {
      const file = event.target.files[0];
      if (!file) return;

      clearError();

      try {
        const ab = await file.arrayBuffer();
        const wb = XLSX.read(ab, { type: "array", cellDates: true });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const data = XLSX.utils.sheet_to_json(ws, {
          header: 1,
          defval: "",
        });

        const parsed = parseSheet(data);

        if (!parsed || parsed.length === 0) {
          showError("Could not read file. Make sure it has columns like Item, LP Number, and Sum of On Hand.");
          return;
        }

        sysRows = parsed;
        phyData = {};

        document.getElementById("uploadBox").style.display = "none";
        document.getElementById("loadedBox").style.display = "flex";
        document.getElementById("loadedFileName").textContent = file.name;
        document.getElementById("loadedCount").textContent = `${sysRows.length} lines loaded`;
        document.getElementById("emptyBox").style.display = "none";
        document.getElementById("tableWrap").style.display = "block";
        document.getElementById("summaryBox").style.display = "flex";
        document.getElementById("signatureBox").style.display = "grid";

        renderTable();
        updateSummary();

      } catch (err) {
        showError("Error reading file: " + err.message);
      }

      event.target.value = "";
    }

    function renderTable() {
      const tbody = document.getElementById("tableBody");
      tbody.innerHTML = "";

      for (const row of sysRows) {
        const tr = document.createElement("tr");

        tr.innerHTML = `
          <td style="color:#999; font-weight:500;">${escapeHtml(row.id)}</td>
          <td style="color:#333; min-width:160px;">${escapeHtml(row.desc)}</td>
          <td style="color:#555;">${escapeHtml(row.sysLP)}</td>
          <td class="right" style="color:#333;">${fmt(row.sysQty)}</td>
          <td style="min-width:110px;">
            <input class="fi" placeholder="LP..." value="${escapeAttr(getPhy(row.key, "lp"))}" oninput="updatePhy('${escapeJs(row.key)}', 'lp', this.value)" />
          </td>
          <td style="min-width:95px;">
            <input class="fi right" type="number" placeholder="0.00" value="${escapeAttr(getPhy(row.key, "qty"))}" oninput="updatePhy('${escapeJs(row.key)}', 'qty', this.value)" />
          </td>
          <td class="right" id="diff-${cssSafe(row.key)}">—</td>
          <td class="center" id="adj-${cssSafe(row.key)}">—</td>
          <td class="center" id="lp-${cssSafe(row.key)}">—</td>
        `;

        tbody.appendChild(tr);
        updateRow(row.key);
      }
    }

    function updatePhy(key, field, value) {
      if (!phyData[key]) phyData[key] = {};
      phyData[key][field] = value;

      updateRow(key);
      updateSummary();
    }

    function getPhy(key, field) {
      return (phyData[key] || {})[field] ?? "";
    }

    function updateRow(key) {
      const row = sysRows.find(r => r.key === key);
      if (!row) return;

      const phyQty = getPhy(key, "qty");
      const phyLP = getPhy(key, "lp");
      const pNum = parseFloat(phyQty);
      const hasQty = phyQty !== "" && !isNaN(pNum);
      const diff = hasQty ? pNum - row.sysQty : null;

      const diffEl = document.getElementById(`diff-${cssSafe(key)}`);
      const adjEl = document.getElementById(`adj-${cssSafe(key)}`);
      const lpEl = document.getElementById(`lp-${cssSafe(key)}`);

      if (diff === null) {
        diffEl.innerHTML = `<span style="color:#ddd;">—</span>`;
        adjEl.innerHTML = `<span class="adj-ok">—</span>`;
      } else {
        const color = Math.abs(diff) < 0.005 ? "#bbb" : diff > 0 ? "#1a7a3e" : "#c0392b";
        diffEl.innerHTML = `<span style="color:${color}; font-weight:500;">${diff > 0 ? "+" : ""}${fmt(diff)}</span>`;

        if (Math.abs(diff) < 0.005) {
          adjEl.innerHTML = `<span class="adj-ok">No adj.</span>`;
        } else if (diff > 0) {
          adjEl.innerHTML = `<span class="adj-up">Adjust Up</span>`;
        } else {
          adjEl.innerHTML = `<span class="adj-down">Adjust Down</span>`;
        }
      }

      const lpEntered = phyLP.trim() !== "";
      const lpMatch = lpEntered
        ? phyLP.trim().toUpperCase() === row.sysLP.trim().toUpperCase()
        : null;

      if (lpMatch === null) {
        lpEl.innerHTML = `<span class="lp-na">—</span>`;
      } else if (lpMatch) {
        lpEl.innerHTML = `<span class="lp-ok">Match</span>`;
      } else {
        lpEl.innerHTML = `<span class="lp-no">No Match</span>`;
      }
    }

    function updateSummary() {
      let filled = 0;
      let up = 0;
      let down = 0;
      let lpBad = 0;

      for (const r of sysRows) {
        const physicalQty = getPhy(r.key, "qty");
        const p = parseFloat(physicalQty);

        if (physicalQty !== "" && !isNaN(p)) {
          filled++;
          const diff = p - r.sysQty;

          if (diff > 0.005) up++;
          else if (diff < -0.005) down++;
        }

        const physicalLP = getPhy(r.key, "lp").trim().toUpperCase();
        const systemLP = r.sysLP.trim().toUpperCase();

        if (physicalLP && physicalLP !== systemLP) lpBad++;
      }

      const summary = document.getElementById("summaryBox");
      let html = `<span>${filled} / ${sysRows.length} lines counted</span>`;

      if (up > 0) html += `<span style="color:#1a7a3e;">${up} adjust up</span>`;
      if (down > 0) html += `<span style="color:#c0392b;">${down} adjust down</span>`;
      if (lpBad > 0) html += `<span style="color:#c0392b;">${lpBad} LP mismatch</span>`;
      if (up === 0 && down === 0 && filled > 0) html += `<span style="color:#1a7a3e;">No adjustments needed</span>`;

      summary.innerHTML = html;
    }

    function exportAdjustments() {
      if (!sysRows.length) {
        showError("Upload a file first.");
        return;
      }

      const rows = [
        ["Kitchen", "Shift", "Item", "Description", "System LP", "Physical LP", "System Qty", "Physical Qty", "Difference", "Adjustment", "LP Match"]
      ];

      const kitchen = document.getElementById("kitchenName").value.trim();

      for (const r of sysRows) {
        const phyQty = getPhy(r.key, "qty");
        const phyLP = getPhy(r.key, "lp");
        const p = parseFloat(phyQty);

        if (phyQty === "" || isNaN(p)) continue;

        const diff = p - r.sysQty;
        const adjustment = Math.abs(diff) < 0.005 ? "No Adjustment" : diff > 0 ? "Adjust Up" : "Adjust Down";
        const lpMatch = phyLP.trim()
          ? phyLP.trim().toUpperCase() === r.sysLP.trim().toUpperCase() ? "Match" : "No Match"
          : "";

        rows.push([
          kitchen,
          selectedShift,
          r.id,
          r.desc,
          r.sysLP,
          phyLP,
          r.sysQty,
          p,
          diff,
          adjustment,
          lpMatch
        ]);
      }

      const csv = rows.map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(",")).join("\n");
      const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = url;
      a.download = "kitchen-adjustments.csv";
      a.click();

      URL.revokeObjectURL(url);
    }

    function removeFile() {
      sysRows = [];
      phyData = {};

      document.getElementById("uploadBox").style.display = "block";
      document.getElementById("loadedBox").style.display = "none";
      document.getElementById("emptyBox").style.display = "block";
      document.getElementById("tableWrap").style.display = "none";
      document.getElementById("summaryBox").style.display = "none";
      document.getElementById("signatureBox").style.display = "none";
      document.getElementById("tableBody").innerHTML = "";
      clearError();
    }

    function showError(message) {
      const box = document.getElementById("errorBox");
      box.textContent = message;
      box.style.display = "block";
    }

    function clearError() {
      const box = document.getElementById("errorBox");
      box.textContent = "";
      box.style.display = "none";
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttr(value) {
      return escapeHtml(value);
    }

    function escapeJs(value) {
      return String(value ?? "").replace(/\\/g, "\\\\").replace(/'/g, "\\'");
    }

    function cssSafe(value) {
      return String(value ?? "").replace(/[^a-zA-Z0-9_-]/g, "_");
    }
  </script>
</body>
</html>
